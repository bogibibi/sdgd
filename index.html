<html lang="ru">

  <style>
    :root {
      --bg-primary: #0a0f0d;
      --bg-secondary: #0f1f15;
      --bg-card: #132a1c;
      --accent: #22c55e;
      --accent-secondary: #4ade80;
      --accent-gradient: linear-gradient(135deg, #16a34a, #22c55e, #4ade80);
      --text-primary: #ffffff;
      --text-secondary: #a8b3ab;
      --text-muted: #6c7a6f;
      --border: rgba(34, 197, 94, 0.25);
      --glow: 0 0 20px rgba(34, 197, 94, 0.3), 0 0 40px rgba(34, 197, 94, 0.1);
      --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Language Selection */
    #langSelection {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-primary);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px;
    }

    .lang-title {
      font-size: 28px;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }

    .lang-btn {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 14px 40px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      width: 240px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .lang-btn:hover, .lang-btn:active {
      border-color: var(--accent);
      box-shadow: var(--glow);
      transform: translateY(-2px);
    }

    /* Header */
    header {
      padding: 30px 20px 20px;
      text-align: center;
      background: linear-gradient(180deg, rgba(233, 69, 96, 0.08) 0%, transparent 100%);
    }

    .logo {
      width: 140px;
      height: auto;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 15px rgba(233, 69, 96, 0.5));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 8px;
      max-width: 320px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.4;
    }

    /* Districts Banner */
    #districtsBanner {
      margin: 10px 15px;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: none;
    }

    .districts-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .district-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .district-tag {
      background: rgba(34, 197, 94, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.4);
      color: #4ade80;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    /* Categories */
    .categories {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 12px 15px;
      position: sticky;
      top: 0;
      background: rgba(13, 13, 13, 0.95);
      backdrop-filter: blur(10px);
      z-index: 10;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .category-btn {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-secondary);
      padding: 8px 20px;
      border-radius: 25px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .category-btn.active {
      background: var(--accent-gradient);
      border-color: transparent;
      color: white;
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
    }

    /* Product Grid */
    .product-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 15px;
      padding-bottom: 140px;
    }

    .product-card {
      background: var(--bg-card);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.3s ease;
      box-shadow: var(--card-shadow);
    }

    .product-card:active {
      transform: scale(0.97);
      border-color: var(--accent);
    }

    .product-image {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      background: var(--bg-secondary);
    }

    .product-info {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .product-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.3;
      min-height: 34px;
    }

    .product-desc {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-price {
      font-size: 16px;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Counter */
    .counter-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg-primary);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .counter-btn {
      background: transparent;
      color: var(--accent);
      border: none;
      width: 36px;
      height: 36px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .counter-btn:active { background: rgba(233, 69, 96, 0.2); }
    .count-value { font-weight: 700; font-size: 14px; color: var(--text-primary); }

    .add-btn {
      background: var(--accent-gradient);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
    }

    .add-btn:active {
      transform: scale(0.95);
      box-shadow: 0 2px 8px rgba(233, 69, 96, 0.5);
    }

    /* Cart */
    .cart-summary {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(22, 33, 62, 0.98);
      backdrop-filter: blur(20px);
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      display: none;
      z-index: 100;
    }

    .total-price {
      font-size: 20px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 10px;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .checkout-btn {
      width: 100%;
      background: var(--accent-gradient);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
      transition: all 0.3s ease;
    }

    .checkout-btn:active {
      transform: scale(0.97);
    }

    /* Modals */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-content {
      background: var(--bg-card);
      padding: 24px;
      border-radius: 20px;
      width: 100%;
      max-width: 400px;
      max-height: 85vh;
      overflow-y: auto;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,0.1);
      color: white;
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
    }

    .modal-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 15px;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .detail-image { width: 100%; border-radius: 12px; margin-bottom: 15px; }
    .detail-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; white-space: pre-line; margin-bottom: 20px; }

    textarea {
      width: 100%;
      background: var(--bg-primary);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-primary);
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 12px;
      box-sizing: border-box;
      min-height: 80px;
      font-family: inherit;
      font-size: 14px;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    /* Delivery checkbox */
    .delivery-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: rgba(233, 69, 96, 0.08);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 15px;
      cursor: pointer;
    }

    .delivery-option input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .delivery-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .delivery-price {
      margin-left: auto;
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
    }

    .modal-buttons { display: flex; gap: 10px; margin-top: 5px; }
    .modal-btn { flex: 1; padding: 13px; border-radius: 10px; border: none; font-weight: 700; font-size: 15px; cursor: pointer; }
    .btn-cancel { background: rgba(255,255,255,0.1); color: var(--text-secondary); }
    .btn-send { background: var(--accent-gradient); color: white; box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3); }
  </style>
</head>

  // --- Load districts from API ---
  async function loadDistricts() {
    try {
      const resp = await fetch('/api/districts');
      const data = await resp.json();
      if (data.districts && data.districts.length > 0) {
        const banner = document.getElementById('districtsBanner');
        const tags = document.getElementById('districtTags');
        banner.style.display = 'block';
        tags.innerHTML = data.districts.map(d =>
          `<span class="district-tag">✅ ${d}</span>`
        ).join('');
      }
    } catch (e) {
      console.log('Districts API not available');
    }
  }

  function setLanguage(lang) {
    currentLang = lang;
    document.getElementById('langSelection').style.display = 'none';
    updateUIStrings();
    renderProducts();
    loadDistricts();
  }

  function updateUIStrings() {
    const L = i18n[currentLang];
    document.getElementById('ui-subtitle').innerText = L.subtitle;
    document.getElementById('cat-all').innerText = L.all;
    document.getElementById('cat-main').innerText = L.main;
    document.getElementById('cat-bakery').innerText = L.bakery;
    document.getElementById('checkoutBtn').innerText = L.checkout;
    document.getElementById('order-modal-title').innerText = L.wishes;
    document.getElementById('customerComment').placeholder = L.placeholder;
    document.getElementById('btn-cancel').innerText = L.cancel;
    document.getElementById('btn-send').innerText = L.send;
    document.getElementById('delivery-label-text').innerText = L.delivery;
    document.getElementById('districts-title-text').innerText = L.districts_title;
    updateCartUI();
  }

  function renderProducts() {
    const grid = document.getElementById('productGrid');
    grid.innerHTML = '';
    const filtered = currentCategory === 'all'
      ? products
      : products.filter(p => p.category === currentCategory);

    filtered.forEach(p => {
      const count = cart.get(p.id)?.count || 0;
      const currentPrice = p.get_price(count || 1);
      const unitLabel = p.unit === 'pc' ? i18n[currentLang].unit_pc : i18n[currentLang].unit_g;

      const card = document.createElement('div');
      card.className = 'product-card';
      card.onclick = () => openDetailModal(p.id);
      card.innerHTML = `
        <img src="${p.image}" class="product-image" onerror="this.style.background='var(--bg-secondary)'">
        <div class="product-info">
          <div class="product-title">${p.title}</div>
          <div class="product-desc">${p.description[currentLang]}</div>
          <div class="product-price">${currentPrice} USDT/${unitLabel}</div>
          <div onclick="event.stopPropagation()">
          ${count === 0
            ? `<button class="add-btn" onclick="updateCount('${p.id}', ${p.weights ? p.weights[0] : 1})">${i18n[currentLang].add}</button>`
            : `<div class="counter-controls">
                <button class="counter-btn" onclick="handleDelta('${p.id}', -1)">−</button>
                <span class="count-value">${count} ${unitLabel}</span>
                <button class="counter-btn" onclick="handleDelta('${p.id}', 1)">+</button>
               </div>`
          }
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function filterProducts(cat) {
    currentCategory = cat;
    document.querySelectorAll('.category-btn').forEach(btn => {
      const btnId = btn.id.replace('cat-', '');
      btn.classList.toggle('active', btnId === cat);
    });
    renderProducts();
  }

  function handleDelta(id, direction) {
    const p = products.find(item => item.id === id);
    const currentCount = cart.get(id)?.count || 0;
    if (p.weights) {
      const currentIndex = p.weights.indexOf(currentCount);
      let nextIndex = currentIndex + direction;
      if (nextIndex < 0) {
        updateCount(id, -currentCount);
      } else if (nextIndex < p.weights.length) {
        const nextWeight = p.weights[nextIndex];
        updateCount(id, nextWeight - currentCount);
      }
    } else {
      updateCount(id, direction);
    }
  }

  function updateCount(id, delta) {
    const p = products.find(item => item.id === id);
    let current = cart.get(id) || { ...p, count: 0 };
    current.count += delta;
    if (current.count <= 0) {
      cart.delete(id);
    } else {
      current.price = p.get_price(current.count);
      cart.set(id, current);
    }
    updateCartUI();
    renderProducts();
    if (document.getElementById('detailModal').style.display === 'flex') {
      updateModalControls(id);
    }
  }

  function updateCartUI() {
    const summary = document.getElementById('cartSummary');
    const totalEl = document.getElementById('totalPrice');
    if (cart.size === 0) {
      summary.style.display = 'none';
      return;
    }
    summary.style.display = 'block';
    let total = 0;
    cart.forEach(item => { total += item.price * item.count; });
    totalEl.innerText = `${i18n[currentLang].total}: ${total.toFixed(1)} USDT`;
  }

  function openDetailModal(id) {
    const p = products.find(item => item.id === id);
    document.getElementById('modalImg').src = p.image;
    document.getElementById('modalTitle').innerText = p.title;
    document.getElementById('modalDesc').innerText = p.description[currentLang];
    updateModalControls(id);
    document.getElementById('detailModal').style.display = 'flex';
  }

  function updateModalControls(id) {
    const p = products.find(item => item.id === id);
    const count = cart.get(id)?.count || 0;
    const currentPrice = p.get_price(count || 1);
    const unitLabel = p.unit === 'pc' ? i18n[currentLang].unit_pc : i18n[currentLang].unit_g;
    document.getElementById('modalPrice').innerText = `${currentPrice} USDT`;
    const controls = document.getElementById('modalControls');
    controls.innerHTML = count === 0
      ? `<button class="add-btn" style="padding:15px;font-size:16px;" onclick="updateCount('${id}', ${p.weights ? p.weights[0] : 1})">${i18n[currentLang].add}</button>`
      : `<div class="counter-controls" style="height:50px;">
          <button class="counter-btn" style="width:60px;font-size:24px;" onclick="handleDelta('${id}', -1)">−</button>
          <span class="count-value" style="font-size:20px;">${count} ${unitLabel}</span>
          <button class="counter-btn" style="width:60px;font-size:24px;" onclick="handleDelta('${id}', 1)">+</button>
         </div>`;
  }

  function closeDetailModal(e) {
    document.getElementById('detailModal').style.display = 'none';
  }

  function openOrderModal() {
    document.getElementById('deliveryCheckbox').checked = false;
    document.getElementById('orderModal').style.display = 'flex';
  }

  function closeOrderModal() {
    document.getElementById('orderModal').style.display = 'none';
  }

  function sendOrder() {
    const comment = document.getElementById('customerComment').value;
    const wantsDelivery = document.getElementById('deliveryCheckbox').checked;

    const orderData = {
      lang: currentLang,
      items: Array.from(cart.values()).map(i => ({
        title: i.title,
        count: i.count,
        weight: i.unit === 'g' ? i.count : null,
        unit: i.unit,
        price: i.price,
        category: i.category
      })),
      total: Array.from(cart.values()).reduce((sum, i) => sum + (i.price * i.count), 0),
      comment: comment,
      delivery: wantsDelivery,
      hasBakery: Array.from(cart.values()).some(i => i.category === 'bakery'),
      hasMain: Array.from(cart.values()).some(i => i.category === 'main')
    };
    tg.sendData(JSON.stringify(orderData));
    tg.close();
  }

  // Init
  renderProducts();
</script>

</body>
</html>
